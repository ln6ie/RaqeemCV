name: iOS Build & Upload to TestFlight

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: RaqeemCV
  BUNDLE_ID: com.elcomlab.raqeem

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH

          # Create and unlock a temporary secure keychain
          security create-keychain -p "temporary_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temporary_password" $KEYCHAIN_PATH

          # Import P12 certificate into keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Grant codesign access to the certificate to prevent CI hanging
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temporary_password" $KEYCHAIN_PATH

          # Extract the UUID from the Provisioning Profile
          PROFILE_UUID=$(security cms -D -i $PP_PATH | grep -A1 UUID | grep string | awk -F'>|<' '{print $3}')
          echo "Extracted UUID: $PROFILE_UUID"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

          # Install the Provisioning Profile using the UUID as the filename
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Generate Native iOS Directory (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod repo update
          pod install

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PROFILE_UUID</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Build Archive & IPA via xcodebuild
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cd ios
          echo "Using Profile UUID: $PROFILE_UUID"
          xcodebuild -workspace $APP_NAME.xcworkspace \
                     -scheme $APP_NAME \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
                     DEVELOPMENT_TEAM="$TEAM_ID" \
                     PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
                     PROVISIONING_PROFILE="$PROFILE_UUID" \
                     PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
                     CODE_SIGN_STYLE="Manual" \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
                     archive

          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $RUNNER_TEMP/build

      - name: Locate Exported IPA File
        id: find_ipa
        run: |
          IPA_FILE=$(find $RUNNER_TEMP/build -name "*.ipa" | head -n 1)
          echo "ipa_path=$IPA_FILE" >> $GITHUB_OUTPUT
          echo "Found IPA at: $IPA_FILE"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ${{ steps.find_ipa.outputs.ipa_path }}

      - name: Upload to Apple TestFlight (Direct altool)
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          IPA_PATH: ${{ steps.find_ipa.outputs.IPA_PATH }}
        run: |
          mkdir -p ~/private_keys
          echo "$PRIVATE_KEY" > ~/private_keys/AuthKey_$API_KEY_ID.p8
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --app-id 6774479492
